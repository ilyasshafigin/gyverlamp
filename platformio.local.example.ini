[platformio]
default_envs = lamp1_ota

[env]
build_flags =
  -D GMT=3
  -D USE_BUTTON
  -D USE_MQTT
  -D USE_OTA

[env:lamp1_base]
board = d1_mini
build_flags =
  ${env.build_flags}
  -D DEVICE_NAME=\"GyverLamp1\"
  -D CURRENT_LIMIT=3000

[env:lamp1_usb]
extends = env:lamp1_base
upload_protocol = esptool

[env:lamp1_ota]
extends = env:lamp1_base
upload_protocol = espota
upload_port = 192.168.1.xxx
